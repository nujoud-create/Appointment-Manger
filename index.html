<!DOCTYPE html>
<html lang="en">
<head>
    <title>Appointment Manger</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
            input,button{
                padding:10px;
                margin:5px;
            }
            table {
                margin-top:200px;
                width:100;
                border-collapse: collapse;
            }
            th,td {
                border:1px solid black;
                padding:10px;
                text-align:center;
            }
    </style>
    </head>

    <body>
        <h2>Appointment Manager</h2>

        <input type="text" id="title" placeholder="Appointment Title">
        <input type="date" id="date">
        <input type="time" id="time">

        <button onclick="addAppointment()">
            Add Appointment       
        </button>
         <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="tableBody">
            </tbody>
         </table>
         <script src="script.js"></script>
         <link rel="stylesheet" href="style.css">

    </body>
    </html>
